name: 自動化測試

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ══════════════════════════════════════════
  # Job 1：Unit Tests（Jest）
  # ══════════════════════════════════════════
  unit-tests:
    name: 單元測試 (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: 安裝 Jest
        run: npm install --save-dev jest

      - name: 執行單元測試
        run: npx jest --coverage

      - name: 上傳覆蓋率報告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ══════════════════════════════════════════
  # Job 2：E2E Tests（Playwright，手機裝置）
  # ══════════════════════════════════════════
  e2e-tests:
    name: E2E 測試 (Playwright 手機)
    runs-on: ubuntu-latest
    needs: unit-tests  # unit tests 過了才跑 E2E

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: 安裝 Playwright 及瀏覽器
        run: |
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium webkit

      - name: Build 專案
        run: npm run build

      - name: 執行 E2E 測試（手機裝置）
        run: npx playwright test --project="iPhone 13" --project="Galaxy S9+"
        env:
          CI: true

      - name: 上傳測試報告與截圖
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ══════════════════════════════════════════
  # Job 3：Build 檢查
  # ══════════════════════════════════════════
  build-check:
    name: Build 驗證
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: 執行 Build
        run: npm run build

      - name: 確認 dist 資料夾存在
        run: test -d dist && echo "✅ Build 成功" || (echo "❌ Build 失敗" && exit 1)
